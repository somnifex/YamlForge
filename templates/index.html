<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YamlForge</title>
    <link rel="icon" href="assets/logo.png" type="image/png" />
    <style>
        :root {
            --bg-color: #f4f4f4;
            --card-bg: #fff;
            --text-color: #333;
            --primary-color: #2196F3;
            --primary-dark: #1976D2;
            --secondary-color: #757575;
            --border-color: #ddd;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --success-color: #4CAF50;
            --success-dark: #388E3C;
            --danger-color: #f44336;
            --danger-dark: #d32f2f;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary-color: #1976D2;
            --primary-dark: #0d47a1;
            --secondary-color: #9e9e9e;
            --border-color: #333;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --success-color: #388E3C;
            --success-dark: #2e7d32;
            --danger-color: #d32f2f;
            --danger-dark: #b71c1c;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .github-corner:hover .octo-arm {
            animation: octocat-wave 560ms ease-in-out
        }

        @keyframes octocat-wave {

            0%,
            100% {
                transform: rotate(0)
            }

            20%,
            60% {
                transform: rotate(-25deg)
            }

            40%,
            80% {
                transform: rotate(10deg)
            }
        }

        @media (max-width:500px) {
            .github-corner:hover .octo-arm {
                animation: none
            }

            .github-corner .octo-arm {
                animation: octocat-wave 560ms ease-in-out
            }
        }

        .container {
            max-width: 960px;
            margin: 30px auto;
            padding: 20px;
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 2px 5px var(--shadow-color);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .tab-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background-color: transparent;
            color: #757575;
            font-size: 16px;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s, color 0.3s;
        }

        .tab.active {
            border-bottom: 2px solid #2196F3;
            color: #2196F3;
        }

        .tab-content {
            display: none;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input,
        select,
        textarea {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 5px rgba(33, 150, 243, 0.3);
        }

        button {
            padding: 10px 15px;
            background-color: #2196F3;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1976D2;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f8f8;
            border: 1px solid #ddd;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: monospace;
        }

        .dns-server-input {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .dns-server-input input {
            flex-grow: 1;
            margin-right: 10px;
            margin-bottom: 0;
        }

        .remove-dns-server {
            background-color: #f44336;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s;
        }

        .remove-dns-server:hover {
            background-color: #d32f2f;
        }

        #add-dns-server {
            background-color: #4CAF50;
            margin-bottom: 15px;
        }

        #add-dns-server:hover {
            background-color: #388E3C;
        }

        .footer {
            background-color: #f8f8f8;
            padding: 20px 0;
            text-align: center;
            font-size: 14px;
            color: #757575;
            border-top: 1px solid #ddd;
            margin-top: 40px;
        }

        .footer-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .footer p {
            margin: 5px 0;
        }

        .footer a {
            color: #2196F3;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: #1976D2;
            text-decoration: underline;
        }

        .footer p:last-child a::before {
            content: "⚖ ";
            margin-right: 2px;
        }

        .theme-switch {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px var(--shadow-color);
            transition: background-color 0.3s;
        }

        .theme-switch:hover {
            background-color: var(--primary-dark);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>
    <a href="https://github.com/somnifex/yamlforge" class="github-corner" aria-label="在 GitHub 查看源码"
        target="_blank" rel="noreferrer" title="在 GitHub 查看源码">
        <svg width="80" height="80" viewBox="0 0 250 250"
            style="fill:#151513; color:#fff; position: absolute; top: 0; border: 0; right: 0;" aria-hidden="true">
            <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
            <path
                d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2"
                fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"></path>
            <path
                d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z"
                fill="currentColor" class="octo-body"></path>
        </svg>
    </a>
    <div class="theme-switch" id="themeSwitch" title="切换主题">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <path
                d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42">
            </path>
        </svg>
    </div>
    <div class="container">
        <h1>YamlForge</h1>

        <div class="tab-container">
            <button class="tab active" data-tab="serverlist">生成列表</button>
            <button class="tab" data-tab="yamlprocess">YAML 处理</button>
        </div>

        <div id="serverlist" class="tab-content active">
            <form id="yamlListForm">
                <label for="api_key">API 密钥：</label>
                <input type="password" id="api_key" name="api_key">

                <label for="source">YAML 文件地址：</label>
                <input type="text" id="source" name="source"
                    placeholder="例如：https://raw.githubusercontent.com/xxx/xxx/main/xxx.yaml" required>

                <label for="field">提取字段：</label>
                <input type="text" id="field" name="field" placeholder="proxies.server" value="proxies.server">

                <label for="resolve-domains">自动解析域名：</label>
                <select id="resolve-domains" name="resolve_domains">
                    <option value="false">否</option>
                    <option value="true">是</option>
                </select>

                <label for="max-depth">最大递归深度：</label>
                <input type="number" id="max-depth" name="max_depth" value="8" min="1" max="20">

                <label for="dns-options">使用自定义 DNS：</label>
                <select id="dns-options" name="dns-options">
                    <option value="no">否</option>
                    <option value="yes">是</option>
                </select>
                <div id="dns-details" style="display: none;">
                    <label for="dns_servers">DNS 服务器（留空时使用 223.5.5.5 和 8.8.8.8，支持 8.138.94.132:8053、[2400:3200::1]:8053
                        或 DoH URL）：</label>
                    <div id="dns-servers-container">
                        <div class="dns-server-input">
                            <input type="text" name="dns_servers" placeholder="例如：223.5.5.5 或 8.138.94.132:8053"
                                value="223.5.5.5,8.8.8.8">
                            <button type="button" class="remove-dns-server">-</button>
                        </div>
                    </div>
                    <button type="button" id="add-dns-server">+ 新增 DNS 服务器</button>
                </div>

                <label for="github-options">上传到 GitHub：</label>
                <select id="github-options" name="github-options">
                    <option value="no">否</option>
                    <option value="yes">是</option>
                </select>

                <div id="github-details" style="display: none;">
                    <label for="repo">仓库名：</label>
                    <input type="text" id="repo" name="repo" placeholder="例如：username/repo">

                    <label for="token">个人访问令牌：</label>
                    <input type="password" id="token" name="token">

                    <label for="branch">分支（默认 main）：</label>
                    <input type="text" id="branch" name="branch" value="main">

                    <label for="path">目录（默认根目录）：</label>
                    <input type="text" id="path" name="path">
                </div>

                <label for="filename">输出文件名（默认 yaml.list）：</label>
                <input type="text" id="filename" name="filename" value="yaml.list">

                <label for="proxy">代理（可选）：</label>
                <input type="text" id="proxy" name="proxy"
                    placeholder="例如：socks5://127.0.0.1:1080 或 http://127.0.0.1:8080">

                <button type="submit">生成列表</button>
            </form>
        </div>

        <div id="yamlprocess" class="tab-content">
            <form id="yamlProcessForm">
                <label for="yaml_api_key">API 密钥：</label>
                <input type="password" id="yaml_api_key" name="api_key">

                <label for="yaml-source">YAML 文件地址：</label>
                <input type="text" id="yaml-source" name="source"
                    placeholder="例如：https://raw.githubusercontent.com/xxx/xxx/main/xxx.yaml" required>

                <label for="merge-url">合并脚本地址：</label>
                <input type="text" id="merge-url" name="merge"
                    placeholder="例如：https://raw.githubusercontent.com/xxx/xxx/main/merge.js" required>

                <label for="yaml-filename">输出文件名：</label>
                <input type="text" id="yaml-filename" name="filename" placeholder="例如：processed.yaml">

                <label for="yaml-proxy">代理（可选）：</label>
                <input type="text" id="yaml-proxy" name="proxy"
                    placeholder="例如：socks5://127.0.0.1:1080 或 http://127.0.0.1:8080">

                <button type="submit">处理 YAML</button>
            </form>
        </div>

        <div id="result"></div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 YamlForge</p>
            <p>作者：<a href="https://github.com/somnifex" target="_blank" rel="noreferrer">somnifex</a></p>
            <p>许可证：<a href="https://www.gnu.org/licenses/gpl-3.0.en.html" target="_blank" rel="noreferrer">GNU General
                    Public License v3.0</a></p>
        </div>
    </footer>

    <script>
        const tabs = document.querySelectorAll('.tab');
        const tabContents = document.querySelectorAll('.tab-content');
        const yamlListForm = document.getElementById('yamlListForm');
        const yamlProcessForm = document.getElementById('yamlProcessForm');
        const resultDiv = document.getElementById('result');
        const dnsOptionsSelect = document.getElementById('dns-options');
        const dnsDetailsDiv = document.getElementById('dns-details');
        const dnsServersContainer = document.getElementById('dns-servers-container');
        const addDnsServerButton = document.getElementById('add-dns-server');
        const githubOptionsSelect = document.getElementById('github-options');
        const githubDetailsDiv = document.getElementById('github-details');
        const themeSwitch = document.getElementById('themeSwitch');
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');

        tabs.forEach((tab) => {
            tab.addEventListener('click', () => {
                const tabId = tab.getAttribute('data-tab');

                tabs.forEach((item) => item.classList.remove('active'));
                tabContents.forEach((content) => content.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(tabId).classList.add('active');
            });
        });

        function setResult(message) {
            resultDiv.textContent = message;
        }

        function toggleSection(select, section) {
            section.style.display = select.value === 'yes' ? 'block' : 'none';
        }

        function createDnsServerInput(value = '') {
            const wrapper = document.createElement('div');
            const input = document.createElement('input');
            const button = document.createElement('button');

            wrapper.className = 'dns-server-input';
            input.type = 'text';
            input.name = 'dns_servers';
            input.placeholder = '例如：8.8.8.8 或 https://dns.google/resolve';
            input.value = value;

            button.type = 'button';
            button.className = 'remove-dns-server';
            button.textContent = '-';
            button.addEventListener('click', () => {
                if (dnsServersContainer.querySelectorAll('.dns-server-input').length > 1) {
                    wrapper.remove();
                }
            });

            wrapper.append(input, button);
            return wrapper;
        }

        async function downloadResponse(response, fallbackName) {
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            const link = document.createElement('a');

            link.href = blobUrl;
            link.download = fallbackName;
            link.click();

            URL.revokeObjectURL(blobUrl);
        }

        async function parseError(response) {
            try {
                const errorData = await response.json();
                return errorData.error || '请求失败，请稍后重试。';
            } catch (error) {
                return `请求失败：${response.status} ${response.statusText}`;
            }
        }

        function applyTheme(theme) {
            const icon = theme === 'dark'
                ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>'
                : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>';

            document.documentElement.setAttribute('data-theme', theme);
            themeSwitch.innerHTML = icon;
        }

        addDnsServerButton.addEventListener('click', () => {
            dnsServersContainer.appendChild(createDnsServerInput());
        });

        dnsServersContainer.querySelector('.remove-dns-server').addEventListener('click', (event) => {
            if (dnsServersContainer.querySelectorAll('.dns-server-input').length > 1) {
                event.target.closest('.dns-server-input').remove();
            }
        });

        dnsOptionsSelect.addEventListener('change', () => toggleSection(dnsOptionsSelect, dnsDetailsDiv));
        githubOptionsSelect.addEventListener('change', () => toggleSection(githubOptionsSelect, githubDetailsDiv));

        toggleSection(dnsOptionsSelect, dnsDetailsDiv);
        toggleSection(githubOptionsSelect, githubDetailsDiv);

        yamlListForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setResult('正在处理，请稍候…');

            const formData = new FormData(yamlListForm);
            const url = `/listget?${new URLSearchParams(formData).toString()}`;

            try {
                const response = await fetch(url);

                if (!response.ok) {
                    setResult(`错误：${await parseError(response)}`);
                    return;
                }

                if (response.headers.get('Content-Disposition')) {
                    await downloadResponse(response, formData.get('filename') || 'yaml.list');
                    setResult('列表已生成，浏览器已开始下载。');
                    return;
                }

                const data = await response.json();
                setResult(`处理完成：\n${JSON.stringify(data, null, 2)}`);
            } catch (error) {
                setResult(`错误：${error.message}`);
            }
        });

        yamlProcessForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setResult('正在处理，请稍候…');

            const formData = new FormData(yamlProcessForm);
            const url = `/yamlprocess?${new URLSearchParams(formData).toString()}`;

            try {
                const response = await fetch(url);

                if (!response.ok) {
                    setResult(`错误：${await parseError(response)}`);
                    return;
                }

                await downloadResponse(response, formData.get('filename') || 'processed.yaml');
                setResult('YAML 已处理完成，浏览器已开始下载。');
            } catch (error) {
                setResult(`错误：${error.message}`);
            }
        });

        const storedTheme = localStorage.getItem('theme');
        applyTheme(storedTheme || (prefersDarkScheme.matches ? 'dark' : 'light'));

        themeSwitch.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';

            localStorage.setItem('theme', nextTheme);
            applyTheme(nextTheme);
        });
    </script>
</body>

</html>
